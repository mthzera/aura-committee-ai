services:
  api:
    build: .
    image: aura-committee-ai:latest
    container_name: aura-committee-ai
    ports:
      - "3001:3000"
    volumes:
      # Atualiza modelos sem rebuild da imagem
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/model-status').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
